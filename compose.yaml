services:
  xdufood:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN before starting}
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - xdufood-data:/data
    restart: unless-stopped

volumes:
  xdufood-data:
